name: stock_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  flutter_secure_storage: ^10.3.1
  dio: ^5.9.2
  razorpay_flutter: ^1.3.7
  google_fonts: ^6.1.0
  fl_chart: ^1.2.0
  web_socket_channel: ^3.0.3
  image_picker: ^1.2.2
  intl: ^0.20.2
  provider: ^6.1.5+1
  candlesticks: ^2.1.0
  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.13.4
  path_provider: ^2.1.4
  share_plus: ^10.1.2
  local_auth: ^2.3.0
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.4
  webview_flutter: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
